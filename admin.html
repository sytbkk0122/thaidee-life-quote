<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>泰迪生活 - 訂單管理後台</title>
<style>
:root {
  --brand: #8B3A1A;
  --brand-d: #5C2410;
  --gold: #D4860A;
  --green: #1A6E3C;
  --red: #e53935;
  --bg: #F4F0EB;
  --border: #E4D9CC;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: "微軟正黑體", sans-serif;
  background: var(--bg);
  color: #333;
}
header {
  background: linear-gradient(135deg, var(--brand) 0%, var(--brand-d) 100%);
  color: white;
  padding: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
header h1 { font-size: 24px; margin-bottom: 5px; }
header p { font-size: 12px; opacity: 0.9; }

.container {
  max-width: 1200px;
  margin: 20px auto;
  padding: 0 20px;
}

.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
  margin-bottom: 30px;
}
.stat-card {
  background: white;
  border-radius: 10px;
  padding: 20px;
  border-left: 4px solid var(--brand);
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}
.stat-card h3 {
  color: var(--brand);
  font-size: 12px;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.stat-card .value {
  font-size: 32px;
  font-weight: 700;
  color: var(--dark, #333);
}

.controls {
  background: white;
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 20px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}
button {
  background: var(--gold);
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 700;
  font-size: 14px;
  transition: all 0.3s;
}
button:hover { background: var(--brand); transform: translateY(-2px); }
button.secondary {
  background: var(--brand);
  padding: 10px 16px;
  font-size: 13px;
}
button.danger { background: var(--red); }

.search-box {
  flex: 1;
  min-width: 200px;
}
.search-box input {
  width: 100%;
  padding: 10px 15px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-family: inherit;
  font-size: 14px;
}

.table-wrapper {
  background: white;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  overflow-x: auto;
}
table {
  width: 100%;
  border-collapse: collapse;
}
th {
  background: var(--brand);
  color: white;
  padding: 15px;
  text-align: left;
  font-size: 13px;
  font-weight: 700;
}
td {
  padding: 12px 15px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
tr:hover { background: #f9f7f3; }

.order-id {
  font-weight: 700;
  color: var(--brand);
}
.status { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
.status.completed { background: #e8f5e9; color: var(--green); }

.empty {
  text-align: center;
  padding: 40px;
  color: #999;
}

footer {
  text-align: center;
  padding: 20px;
  color: #999;
  font-size: 12px;
}
</style>
</head>
<body>
<header>
  <h1>🏛️ 泰迪生活訂單管理後台</h1>
  <p>追蹤所有客戶訂單 • 匯出業務數據</p>
</header>

<div class="container">
  <!-- 統計卡片 -->
  <div class="stats">
    <div class="stat-card">
      <h3>📋 總訂單數</h3>
      <div class="value" id="total-orders">0</div>
    </div>
    <div class="stat-card">
      <h3>💰 總收入 (THB)</h3>
      <div class="value" id="total-revenue">0</div>
    </div>
    <div class="stat-card">
      <h3>👥 客戶數</h3>
      <div class="value" id="unique-customers">0</div>
    </div>
    <div class="stat-card">
      <h3>📅 平均天數</h3>
      <div class="value" id="avg-days">0</div>
    </div>
  </div>

  <!-- 控制面板 -->
  <div class="controls">
    <button onclick="location.href='price-management.html'" style="background:#E67E22">💰 價格管理</button>
    <button onclick="exportToCSV()">📥 導出 CSV</button>
    <button class="secondary" onclick="exportToExcel()">📊 導出 Excel</button>
    <button class="secondary" onclick="printOrders()">🖨️ 列印</button>
    <button class="danger" onclick="clearAllOrders()">🗑️ 清空所有</button>
    <div class="search-box">
      <input type="text" id="search" placeholder="搜尋客戶名稱或郵件..." onkeyup="filterOrders()">
    </div>
  </div>

  <!-- 訂單表格 -->
  <div class="table-wrapper">
    <table id="orders-table">
      <thead>
        <tr>
          <th>訂單 ID</th>
          <th>日期</th>
          <th>客戶名稱</th>
          <th>郵件</th>
          <th>電話</th>
          <th>行程</th>
          <th>人數</th>
          <th>總價 (THB)</th>
          <th>用餐方式</th>
          <th>備註</th>
        </tr>
      </thead>
      <tbody id="orders-body">
        <tr><td colspan="10" class="empty">沒有訂單數據</td></tr>
      </tbody>
    </table>
  </div>
</div>

<footer>
  <p>© 2026 泰迪生活 Thai-Dee Life | 訂單數據自動保存</p>
</footer>

<script>
// 載入訂單數據
function loadOrders() {
  const orders = JSON.parse(localStorage.getItem('thaidee_orders') || '[]');
  renderOrders(orders);
  updateStats(orders);
}

// 更新統計信息
function updateStats(orders) {
  const totalOrders = orders.length;
  const totalRevenue = orders.reduce((sum, o) => sum + (o.grand || 0), 0);
  const uniqueCustomers = new Set(orders.map(o => o.email)).size;
  const avgDays = orders.length > 0
    ? (orders.reduce((sum, o) => {
        const dep = new Date(o.dep);
        const ret = new Date(o.ret);
        return sum + (isNaN(dep) || isNaN(ret) ? 0 : Math.ceil((ret - dep) / (1000 * 60 * 60 * 24)));
      }, 0) / orders.length).toFixed(1)
    : 0;

  document.getElementById('total-orders').textContent = totalOrders;
  document.getElementById('total-revenue').textContent = totalRevenue.toLocaleString();
  document.getElementById('unique-customers').textContent = uniqueCustomers;
  document.getElementById('avg-days').textContent = avgDays;
}

// 渲染訂單表格
function renderOrders(orders) {
  const tbody = document.getElementById('orders-body');
  if (orders.length === 0) {
    tbody.innerHTML = '<tr><td colspan="10" class="empty">沒有訂單數據</td></tr>';
    return;
  }

  tbody.innerHTML = orders.map(o => `
    <tr>
      <td class="order-id">${o.id}</td>
      <td>${o.timestamp}</td>
      <td>${o.name}</td>
      <td>${o.email}</td>
      <td>${o.phone}</td>
      <td>${o.dep} ~ ${o.ret}</td>
      <td>${o.adults}</td>
      <td><strong>${o.grand?.toLocaleString()}</strong></td>
      <td>${o.diningMode || '─'}</td>
      <td>${o.note || '─'}</td>
    </tr>
  `).join('');
}

// 搜尋訂單
function filterOrders() {
  const query = document.getElementById('search').value.toLowerCase();
  const orders = JSON.parse(localStorage.getItem('thaidee_orders') || '[]');
  const filtered = orders.filter(o =>
    o.name.toLowerCase().includes(query) ||
    o.email.toLowerCase().includes(query)
  );
  renderOrders(filtered);
}

// 導出 CSV
function exportToCSV() {
  const orders = JSON.parse(localStorage.getItem('thaidee_orders') || '[]');
  if (orders.length === 0) {
    alert('沒有訂單可導出');
    return;
  }

  let csv = '訂單ID,日期,客戶名稱,郵件,電話,出發,回程,人數,單價THB,總價THB,用餐方式,餐廳,備註\n';
  orders.forEach(o => {
    csv += `${o.id},"${o.timestamp}","${o.name}","${o.email}","${o.phone}","${o.dep}","${o.ret}",${o.adults},${o.perPerson},${o.grand},"${o.diningMode || '─'}","${o.restaurant || '─'}","${o.note || '─'}"\n`;
  });

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `泰迪生活訂單_${new Date().toISOString().split('T')[0]}.csv`;
  link.click();
}

// 導出 Excel
function exportToExcel() {
  const orders = JSON.parse(localStorage.getItem('thaidee_orders') || '[]');
  if (orders.length === 0) {
    alert('沒有訂單可導出');
    return;
  }

  // 使用 SheetJS 庫（簡單版本）
  let html = '<table><tr><th>訂單ID</th><th>日期</th><th>客戶名稱</th><th>郵件</th><th>電話</th><th>出發</th><th>回程</th><th>人數</th><th>總價THB</th></tr>';
  orders.forEach(o => {
    html += `<tr><td>${o.id}</td><td>${o.timestamp}</td><td>${o.name}</td><td>${o.email}</td><td>${o.phone}</td><td>${o.dep}</td><td>${o.ret}</td><td>${o.adults}</td><td>${o.grand}</td></tr>`;
  });
  html += '</table>';

  const blob = new Blob([html], { type: 'application/vnd.ms-excel;charset=utf-8;' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `泰迪生活訂單_${new Date().toISOString().split('T')[0]}.xls`;
  link.click();
}

// 列印訂單
function printOrders() {
  const orders = JSON.parse(localStorage.getItem('thaidee_orders') || '[]');
  const table = document.getElementById('orders-table').outerHTML;
  const printWindow = window.open('', '', 'height=600,width=1200');
  printWindow.document.write(`
    <html><head><title>泰迪生活訂單</title>
    <style>
      body { font-family: Arial; margin: 20px; }
      table { border-collapse: collapse; width: 100%; }
      th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
      th { background: #8B3A1A; color: white; }
    </style>
    </head><body>
    <h1>泰迪生活訂單報表</h1>
    <p>生成時間: ${new Date().toLocaleString('zh-TW')}</p>
    ${table}
    </body></html>
  `);
  printWindow.document.close();
  printWindow.print();
}

// 清空所有訂單
function clearAllOrders() {
  if (confirm('⚠️ 確定要清空所有訂單嗎？此操作無法復原！')) {
    localStorage.removeItem('thaidee_orders');
    loadOrders();
    alert('✅ 所有訂單已清空');
  }
}

// 頁面加載時初始化
window.addEventListener('load', loadOrders);

// 自動刷新（每10秒檢查一次新訂單）
setInterval(loadOrders, 10000);
</script>
</body>
</html>
